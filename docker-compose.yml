version: "3.9"

services:
  api:
    build: .
    container_name: cryptotracker-api
    ports:
      - "8000:8000"
    volumes:
      - ./cryptotracker.db:/app/cryptotracker.db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./cryptotracker.db
    env_file:
      - .env
    restart: unless-stopped
